<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Крутой Бизнес Калькулятор</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <h1>CBC Entrance</h1>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <div id="loginForm" class="form active">
            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" id="loginUsername" placeholder="Введите имя пользователя">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
            </div>
            <button class="btn" id="loginBtn">Войти</button>
        </div>

        <!-- Форма регистрации (только пользователь) -->
        <div id="registerForm" class="form">
            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" id="regUsername" placeholder="Придумайте имя пользователя">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль">
            </div>
            <div class="input-group">
                <label>Подтверждение пароля</label>
                <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
            </div>
            <button class="btn" id="registerBtn">Зарегистрироваться</button>
        </div>

        <div class="info-message">
            <strong>Админ</strong>
            <p>Логин: <strong>admin</strong> || Пароль: <strong>admin123</strong></p>
        </div>
    </div>

    <script src="js/auth-page.js"></script>
</body>
</html>
