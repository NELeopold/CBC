<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Bonus App | Дашборд</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dark.css" id="theme-style">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>KPI Bonus App</h1>
                <div class="user-info" id="userInfo"></div>
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="theme-btn">🌙</button>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
        </div>
        
        <div class="subtitle" id="subtitle">
            <span id="subtitleText">Калькулятор эффективности</span>
        </div>

        <!-- Кнопки переключения режимов -->
        <div class="mode-buttons">
            <button class="mode-btn" data-mode="roi">ROI</button>
            <button class="mode-btn" data-mode="revenue">Доход</button>
            <button class="mode-btn" data-mode="kpi">KPI сотрудника</button>
            <!-- <button class="mode-btn" data-mode="employees">Сотрудники</button> -->
        </div>

        <!-- Режим ROI -->
        <div id="roiMode" class="mode-content">
            <div class="input-group">
                <label>Размер вложений</label>
                <input type="number" id="investment" placeholder="Введите сумму вложений">
            </div>
            <div class="input-group">
                <label>Доход от вложений</label>
                <input type="number" id="returnAmount" placeholder="Введите доход от вложений">
            </div>
        </div>

        <!-- Режим Доход -->
        <div id="revenueMode" class="mode-content">
            <div class="input-group">
                <label>Количество продаж за период</label>
                <input type="number" id="salesCount" placeholder="Например: 150">
            </div>
            <div class="input-group">
                <label>Средняя стоимость продажи</label>
                <input type="number" id="avgPrice" placeholder="Например: 5000">
            </div>
        </div>

        <!-- Режим KPI сотрудника -->
        <div id="kpiMode" class="mode-content">
            <div class="input-group">
                <label>Выберите сотрудника</label>
                <select id="employeeSelect">
                    <option value="">-- Выберите сотрудника --</option>
                </select>
            </div>
            <div class="input-group">
                <label>Фактический результат</label>
                <input type="number" id="actual" placeholder="Введите фактическое значение">
            </div>
            <div class="input-group">
                <label>Плановое значение (цель)</label>
                <input type="number" id="planned" placeholder="Введите плановое значение">
            </div>
            <div class="input-group">
                <label>Вес KPI (0-100%)</label>
                <input type="number" id="weight" placeholder="Вес показателя" value="100">
            </div>
        </div>

        <!-- Режим Сотрудники (только для админа) -->
        <div id="employeesMode" class="mode-content">
            <button id="addEmployeeBtn" class="add-btn">Добавить сотрудника</button>
            <div id="employeesList" class="employees-list"></div>
        </div>

        <button class="calculate-btn" id="calculateBtn">Рассчитать</button>

        <!-- Результаты -->
        <div id="resultsContainer"></div>

        <!-- История расчетов -->
        <div id="historySection" style="display: none;">
            <h3>История расчетов</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistoryBtn" class="clear-btn">Очистить историю</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/kpiCalculator.js"></script>
    <script src="js/roiCalculator.js"></script>
    <script src="js/revenueCalculator.js"></script>
    <script src="js/employees.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
